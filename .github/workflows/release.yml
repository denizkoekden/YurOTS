name: build & release

# Builds the modernized YurOTS (Tibia 7.6) for Windows, Linux and macOS, bundles all
# runtime dependencies into self-contained ("download & run") .zip packages, and — on
# a version tag (v*) — publishes them as a GitHub Release.
#
# Toolchains: Linux = GCC, macOS = Clang, Windows = MinGW-w64 (MSYS2) — the modern
# successor of the original Dev-C++ MinGW build. Storage is file-based (XML/OTBM),
# Lua 5.0 is vendored and linked statically, so the only shared deps are libxml2 and
# Boost.regex.

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed for creating the Release on tags

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  label: linux,   shell: bash }
          - { os: macos-latest,   label: macos,   shell: bash }
          - { os: windows-latest, label: windows, shell: 'msys2 {0}' }

    steps:
      - uses: actions/checkout@v4

      # --------------------------------------------------------- deps: Linux
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ patchelf zip \
            libxml2-dev libboost-regex-dev

      # --------------------------------------------------------- deps: macOS
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew update
          brew install ninja boost libxml2 dylibbundler || true

      # ------------------------------------------------ deps: Windows (MSYS2)
      - name: Set up MSYS2 / MinGW-w64 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            zip
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-libxml2
            mingw-w64-x86_64-boost

      # ----------------------------------------- configure + build + install
      # The CMake project lives in ots/ (config.lua + data/ are installed from there).
      - name: Configure
        run: cmake -S ots -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Stage package
        run: cmake --install build --prefix dist

      # ---------------------------------------------------- bundle deps: Linux
      - name: Bundle shared libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/lib
          ldd dist/YurOTS | awk '/=>/ {print $3}' | while read -r so; do
            [ -e "$so" ] || continue
            case "$(basename "$so")" in
              libc.so*|libm.so*|libpthread.so*|libdl.so*|librt.so*|ld-linux*|libresolv.so*) ;;
              *) cp -vL "$so" dist/lib/ ;;
            esac
          done
          patchelf --set-rpath '$ORIGIN/lib' dist/YurOTS
          printf '#!/bin/sh\ncd "$(dirname "$0")"\nexec ./YurOTS "$@"\n' > dist/run.sh
          chmod +x dist/run.sh dist/YurOTS

      # ---------------------------------------------------- bundle deps: macOS
      - name: Bundle dylibs (macOS)
        if: runner.os == 'macOS'
        run: |
          dylibbundler -od -b -x dist/YurOTS -d dist/libs -p @executable_path/libs
          printf '#!/bin/sh\ncd "$(dirname "$0")"\nexec ./YurOTS "$@"\n' > dist/run.sh
          chmod +x dist/run.sh dist/YurOTS

      # ------------------------------------------- bundle deps: Windows (MinGW)
      - name: Bundle DLLs (Windows / MinGW)
        if: runner.os == 'Windows'
        run: |
          cd dist
          # Copy every MinGW DLL the exe transitively needs (ldd lists the full set);
          # system DLLs under C:/Windows are left out by the /mingw64/ filter.
          ldd YurOTS.exe | awk '/=>/ {print $3}' | grep -iE '/mingw64/' | while read -r dll; do
            cp -v "$dll" . || true
          done
          printf '@echo off\r\ncd /d %%~dp0\r\nYurOTS.exe %%*\r\npause\r\n' > run.bat

      # ------------------------------------------------------ README in package
      - name: Add package README
        run: |
          cat > dist/README-PACKAGE.txt <<EOF
          YurOTS - OpenTibia Server for Tibia 7.6 (modernized)
          Platform: ${{ matrix.label }}

          HOW TO RUN
            Windows : double-click run.bat (or YurOTS.exe)
            Linux   : ./run.sh   (or ./YurOTS)
            macOS   : ./run.sh   (or ./YurOTS)   [right-click > Open the first time]

          The server reads ./config.lua and the ./data folder from this directory and
          serves login + game on a single port (default 7171). Storage is file-based
          (XML accounts/players, OTBM map) — no database required.
          EOF

      # --------------------------------------------------------------- package
      - name: Create zip
        run: |
          PKG="yurots-0.9.4-${{ matrix.label }}"
          mv dist "$PKG"
          zip -r "$PKG.zip" "$PKG"
          echo "PKG=$PKG" >> "$GITHUB_ENV"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG }}
          path: ${{ env.PKG }}.zip
          if-no-files-found: error

      # ---------------------------------------------------- Release (on tag)
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PKG }}.zip
          fail_on_unmatched_files: true
